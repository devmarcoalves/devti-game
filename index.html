<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>DEVTI v1.0.0</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: #010409;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1.5rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(33,210,120,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(33,210,120,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(35,134,54,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      width: 100%;
      max-width: 620px;
      z-index: 1;
      position: relative;
    }

    .terminal {
      background: #0d1117;
      border-radius: 12px;
      border: 1px solid #30363d;
      box-shadow: 0 0 0 1px #21262d, 0 24px 80px rgba(0,0,0,0.6);
      overflow: hidden;
    }

    .term-bar {
      background: #161b22;
      padding: 12px 16px;
      display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid #30363d;
      user-select: none;
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .dot-r { background: #ff5f57; }
    .dot-y { background: #ffbd2e; }
    .dot-g { background: #28c840; }

    .term-title {
      font-family: 'Courier New', monospace;
      font-size: 12px; color: #6e7681;
      margin-left: 6px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .term-body { padding: 1.5rem; }

    /* Intro */
    .prompt { font-family: 'Courier New', monospace; font-size: 13px; color: #58a6ff; margin-bottom: .75rem; }
    .prompt span { color: #3fb950; }

    .devti-title {
      font-family: 'Courier New', monospace;
      font-size: clamp(32px, 12vw, 52px);
      font-weight: 700;
      color: #3fb950;
      letter-spacing: 0.1em;
      min-height: 1.2em;
      display: flex; align-items: center;
      margin: 1rem 0 0.25rem;
    }

    .devti-version {
      font-family: 'Courier New', monospace;
      font-size: 11px; color: #3fb950;
      opacity: 0; letter-spacing: 0.2em;
      margin-bottom: 1.25rem;
      transition: opacity .4s ease;
    }

    .tw-cursor {
      display: inline-block;
      width: 3px;
      height: 0.85em;
      background: #3fb950;
      margin-left: 4px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
      border-radius: 1px;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .intro-text {
      font-family: 'Courier New', monospace;
      font-size: 13px; color: #8b949e;
      line-height: 2; margin-bottom: 1.25rem;
      opacity: 0; transition: opacity .5s ease;
    }
    .intro-text .hl     { color: #e6edf3; }
    .intro-text .green  { color: #3fb950; }
    .intro-text .yellow { color: #d29922; }
    .intro-text .blue   { color: #58a6ff; }

    .tag-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.75rem; opacity: 0; transition: opacity .5s ease; }
    .tag {
      font-family: 'Courier New', monospace;
      font-size: 11px; padding: 3px 10px; border-radius: 4px;
    }
    .tag-g { background: #0d4429; color: #3fb950; border: 1px solid #238636; }
    .tag-b { background: #0c2d6b; color: #58a6ff; border: 1px solid #1f6feb; }
    .tag-y { background: #3d2e00; color: #d29922; border: 1px solid #9e6a03; }

    .intro-btn-wrap { opacity: 0; transition: opacity .5s ease; }

    .btn-run {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%;
      background: #238636; color: #fff;
      border: 1px solid #2ea043; border-radius: 6px;
      padding: .85rem 1.75rem;
      font-family: 'Courier New', monospace; font-size: 15px; font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-run:active { background: #2ea043; }

    /* Progress */
    .prog-wrap { margin-bottom: 1.25rem; }
    .prog-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .prog-label { font-family: 'Courier New', monospace; font-size: 11px; color: #8b949e; }
    .prog-score { font-family: 'Courier New', monospace; font-size: 11px; color: #3fb950; }
    .prog-bar { width: 100%; height: 4px; background: #21262d; border-radius: 2px; overflow: hidden; }
    .prog-fill { height: 100%; background: #238636; border-radius: 2px; transition: width .5s ease; }

    /* Question */
    .q-badge {
      font-family: 'Courier New', monospace;
      font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 3px;
      display: inline-block; margin-bottom: .75rem;
    }
    .badge-logic  { background: #0c2d6b; color: #58a6ff; border: 1px solid #1f6feb; }
    .badge-algo   { background: #3d2e00; color: #d29922; border: 1px solid #9e6a03; }
    .badge-binary { background: #0d4429; color: #3fb950; border: 1px solid #238636; }
    .badge-debug  { background: #2d1a00; color: #f0883e; border: 1px solid #bd561d; }
    .badge-regex  { background: #271a3d; color: #bc8cff; border: 1px solid #6e40c9; }

    .q-code {
      font-family: 'Courier New', monospace;
      font-size: 12px; color: #e6edf3;
      background: #161b22; border: 1px solid #30363d; border-radius: 6px;
      padding: 1rem; margin-bottom: 1rem;
      line-height: 1.85; white-space: pre; overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .c-comment { color: #6e7681; }
    .c-keyword  { color: #ff7b72; }
    .c-string   { color: #a5d6ff; }
    .c-func     { color: #d2a8ff; }
    .c-num      { color: #79c0ff; }
    .c-op       { color: #58a6ff; }

    .q-text {
      font-family: 'Courier New', monospace;
      font-size: 13px; color: #8b949e; line-height: 1.7; margin-bottom: 1rem;
    }
    .q-text .hl { color: #e6edf3; }

    .hint-btn {
      font-family: 'Courier New', monospace;
      font-size: 12px; color: #8b949e;
      background: #161b22; border: 1px solid #30363d; border-radius: 5px;
      padding: .4rem .9rem; cursor: pointer;
      margin-bottom: .75rem; display: inline-block;
      -webkit-tap-highlight-color: transparent;
    }

    .hint-box {
      font-family: 'Courier New', monospace;
      font-size: 12px; color: #d29922;
      background: #1c1f00; border: 1px solid #3d2e00; border-radius: 5px;
      padding: .6rem 1rem; margin-bottom: .75rem; display: none; line-height: 1.6;
    }

    .opts { display: grid; grid-template-columns: 1fr; gap: 10px; }

    .opt {
      background: #161b22; border: 1px solid #30363d; border-radius: 6px;
      padding: .9rem 1rem;
      font-family: 'Courier New', monospace; font-size: 13px;
      color: #e6edf3; cursor: pointer; text-align: left; line-height: 1.5;
      -webkit-tap-highlight-color: transparent;
    }
    .opt:active  { background: #1f2937; border-color: #58a6ff; }
    .opt.correct { background: #0d4429; border-color: #3fb950; color: #3fb950; }
    .opt.wrong   { background: #2d1010; border-color: #f85149; color: #f85149; }
    .opt:disabled { cursor: default; }

    .fb {
      margin-top: .75rem;
      font-family: 'Courier New', monospace;
      font-size: 12px; min-height: 20px; line-height: 1.6;
    }
    .fb.ok   { color: #3fb950; }
    .fb.nope { color: #f85149; }

    .next-btn {
      display: none; margin-top: .9rem; width: 100%;
      background: #238636; color: #fff;
      border: 1px solid #2ea043; border-radius: 6px;
      padding: .85rem;
      font-family: 'Courier New', monospace; font-size: 13px; font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .next-btn:active { background: #2ea043; }

    /* Final */
    .f-line {
      font-family: 'Courier New', monospace;
      font-size: 12px; color: #8b949e;
      margin-bottom: .25rem; line-height: 1.7;
    }
    .f-line.green { color: #3fb950; }

    .reveal-block {
      background: #0d1f0d; border: 1px solid #238636; border-radius: 8px;
      padding: 1.25rem; margin: 1.25rem 0;
      animation: fadeInUp .6s ease both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .reveal-title {
      font-family: 'Courier New', monospace;
      font-size: clamp(16px, 5vw, 22px); font-weight: 700; color: #3fb950;
      margin-bottom: .75rem;
    }

    .reveal-code {
      font-family: 'Courier New', monospace;
      font-size: 12px; color: #8b949e; line-height: 2;
    }
    .reveal-code .hl    { color: #e6edf3; }
    .reveal-code .green { color: #3fb950; }
    .reveal-code .pink  { color: #bc8cff; }

    .score-row {
      font-family: 'Courier New', monospace;
      font-size: 12px; color: #8b949e; margin-bottom: .2rem;
    }
    .score-row span { color: #58a6ff; }

    .restart-btn {
      margin-top: 1.25rem; width: 100%;
      background: transparent; border: 1px solid #30363d; border-radius: 6px;
      padding: .7rem 1.25rem;
      font-family: 'Courier New', monospace; font-size: 11px; color: #6e7681;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .restart-btn:active { background: #161b22; }

    #confetti-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 99;
      display: none;
    }

    @media (min-width: 601px) {
      body { align-items: center; padding: 2rem 1rem; }
      .opts { grid-template-columns: 1fr 1fr; }
      .opt { text-align: center; }
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="wrapper">
  <div class="terminal">
    <div class="term-bar">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
      <span class="term-title" id="term-title">enigma.exe — bash</span>
    </div>
    <div class="term-body" id="term-body"></div>
  </div>
</div>

<script>
var questions = [
  {
    badge: 'badge-logic', cat: '// LÓGICA',
    code: '<span class="c-keyword">function</span> <span class="c-func">mystery</span>(n) {\n  <span class="c-keyword">if</span> (n <span class="c-op">===</span> <span class="c-num">0</span>) <span class="c-keyword">return</span> <span class="c-num">0</span>;\n  <span class="c-keyword">return</span> n <span class="c-op">+</span> <span class="c-func">mystery</span>(n <span class="c-op">-</span> <span class="c-num">1</span>);\n}\n\n<span class="c-func">mystery</span>(<span class="c-num">5</span>); <span class="c-comment">// output = ?</span>',
    text: 'O que essa função retorna com <span class="hl">n = 5</span>?',
    hint: 'Ela chama a si mesma somando n até chegar em 0...',
    options: ['10', '15', '25', '120'],
    answer: 1,
    ok: '// ✓ 5+4+3+2+1+0 = 15. Recursão somando n até zero.'
  },
  {
    badge: 'badge-binary', cat: '// BASE 2',
    code: '<span class="c-comment">// Converta para decimal:</span>\n<span class="c-keyword">const</span> bin <span class="c-op">=</span> <span class="c-string">"1010"</span>;\n\n<span class="c-comment">// 1×2³ + 0×2² + 1×2¹ + 0×2⁰</span>\n<span class="c-comment">// = ? + ? + ? + ?</span>',
    text: 'Qual o valor decimal de <span class="hl">0b1010</span>?',
    hint: 'Potências de 2: 8, 4, 2, 1...',
    options: ['8', '10', '12', '16'],
    answer: 1,
    ok: '// ✓ 8+0+2+0 = 10. Binário clássico!'
  },
  {
    badge: 'badge-algo', cat: '// COMPLEXIDADE',
    code: '<span class="c-keyword">for</span> (<span class="c-keyword">let</span> i <span class="c-op">=</span> <span class="c-num">0</span>; i <span class="c-op">&lt;</span> n; i<span class="c-op">++</span>) {\n  <span class="c-keyword">for</span> (<span class="c-keyword">let</span> j <span class="c-op">=</span> <span class="c-num">0</span>; j <span class="c-op">&lt;</span> n; j<span class="c-op">++</span>) {\n    <span class="c-func">doSomething</span>(i, j);\n  }\n}',
    text: 'Qual a <span class="hl">Big O notation</span> desse algoritmo?',
    hint: 'Dois loops aninhados, cada um rodando n vezes...',
    options: ['O(n)', 'O(log n)', 'O(n²)', 'O(2n)'],
    answer: 2,
    ok: '// ✓ O(n²) — dois loops aninhados = n × n operações.'
  },
  {
    badge: 'badge-debug', cat: '// DEBUG',
    code: '<span class="c-keyword">const</span> arr <span class="c-op">=</span> [<span class="c-num">3</span>, <span class="c-num">1</span>, <span class="c-num">4</span>, <span class="c-num">1</span>, <span class="c-num">5</span>];\n<span class="c-keyword">const</span> result <span class="c-op">=</span> arr\n  .<span class="c-func">filter</span>(x <span class="c-op">=&gt;</span> x <span class="c-op">&gt;</span> <span class="c-num">2</span>)\n  .<span class="c-func">map</span>(x <span class="c-op">=&gt;</span> x <span class="c-op">*</span> <span class="c-num">2</span>);\n\n<span class="c-func">console</span>.<span class="c-func">log</span>(result); <span class="c-comment">// ?</span>',
    text: 'Qual o valor de <span class="hl">result</span>?',
    hint: 'Primeiro filtra maiores que 2, depois multiplica por 2...',
    options: ['[6, 8, 10]', '[6, 2, 8, 2, 10]', '[3, 4, 5]', '[8, 10]'],
    answer: 0,
    ok: '// ✓ filter(>2) → [3,4,5] → map(*2) → [6,8,10]'
  },
  {
    badge: 'badge-regex', cat: '// JS QUIRKS',
    code: '<span class="c-func">console</span>.<span class="c-func">log</span>(<span class="c-keyword">typeof</span> <span class="c-keyword">null</span>);       <span class="c-comment">// ?</span>\n<span class="c-func">console</span>.<span class="c-func">log</span>(<span class="c-keyword">typeof</span> []);         <span class="c-comment">// ?</span>\n<span class="c-func">console</span>.<span class="c-func">log</span>(<span class="c-num">0.1</span> <span class="c-op">+</span> <span class="c-num">0.2</span> <span class="c-op">===</span> <span class="c-num">0.3</span>);  <span class="c-comment">// ?</span>',
    text: 'Qual resposta está <span class="hl">100% correta</span>?',
    hint: 'JS tem pegadinhas com tipos e floating point...',
    options: ['"null", "array", true', '"object", "object", false', '"null", "object", true', '"object", "array", false'],
    answer: 1,
    ok: '// ✓ typeof null="object" (bug histórico!), typeof []="object", 0.1+0.2 != 0.3'
  },
  {
    badge: 'badge-logic', cat: '// GIT',
    code: '<span class="c-comment"># Commit errado na main.</span>\n<span class="c-comment"># Desfazer o último commit</span>\n<span class="c-comment"># mas MANTER as alterações.</span>\n\n$ git _____ HEAD~1',
    text: 'Qual comando preenche o <span class="hl">_____</span>?',
    hint: 'Existem 3 modos: --soft, --mixed e --hard...',
    options: ['reset --hard', 'reset --soft', 'revert HEAD', 'checkout HEAD~1'],
    answer: 1,
    ok: '// ✓ git reset --soft mantém alterações em staged. --hard deletaria tudo.'
  },
  {
    badge: 'badge-algo', cat: '// ESTRUTURAS',
    code: '<span class="c-comment">// Estrutura LIFO:</span>\n<span class="c-comment">// Last In, First Out</span>\n\n<span class="c-func">push</span>(<span class="c-string">\'a\'</span>)  <span class="c-comment">// [\'a\']</span>\n<span class="c-func">push</span>(<span class="c-string">\'b\'</span>)  <span class="c-comment">// [\'a\',\'b\']</span>\n<span class="c-func">push</span>(<span class="c-string">\'c\'</span>)  <span class="c-comment">// [\'a\',\'b\',\'c\']</span>\n<span class="c-func">pop</span>()    <span class="c-comment">// retorna = ?</span>',
    text: 'O que o <span class="hl">pop()</span> retorna?',
    hint: 'O último a entrar é o primeiro a sair...',
    options: ['"a"', '"b"', '"c"', 'undefined'],
    answer: 2,
    ok: '// ✓ LIFO = Stack. O último inserido ("c") é o primeiro a sair.'
  }
];

var current = 0, score = 0, answered = false;

function setTitle(t) {
  document.getElementById('term-title').textContent = t;
}

function render(html) {
  var body = document.getElementById('term-body');
  body.innerHTML = html;
}

function showIntro() {
  setTitle('enigma.exe — bash');
  render(
    '<div class="prompt"><span>user@missao</span>:~$ ./iniciar_desafio.sh</div>' +
    '<div class="devti-title"><span id="tw-text"></span><span class="tw-cursor" id="tw-cursor"></span></div>' +
    '<div class="devti-version" id="devti-ver">v1.0.0</div>' +
    '<div class="intro-text" id="intro-lines">' +
      '<span class="green">></span> Bem-vindo ao <span class="hl">DEVTI</span><br>' +
      '<span class="green">></span> <span class="yellow">' + questions.length + ' desafios</span> aguardam resolução.<br>' +
      '<span class="green">></span> Cada resposta correta <span class="blue">++score</span>.<br>' +
      '<span class="green">></span> Complete tudo para <span class="hl">desbloquear o payload final</span>.<br>' +
      '<span class="green">></span> Boa sorte. Você vai precisar.<span class="tw-cursor"></span>' +
    '</div>' +
    '<div class="tag-row" id="intro-tags">' +
      '<span class="tag tag-g">recursão</span>' +
      '<span class="tag tag-b">big-O</span>' +
      '<span class="tag tag-y">git</span>' +
      '<span class="tag tag-g">JS quirks</span>' +
      '<span class="tag tag-b">estruturas</span>' +
    '</div>' +
    '<div class="intro-btn-wrap" id="intro-btn">' +
      '<button class="btn-run" onclick="startGame()">&#9654; &nbsp;npm run start</button>' +
    '</div>'
  );

  var word = 'DEVTI';
  var twText = document.getElementById('tw-text');
  var twCursor = document.getElementById('tw-cursor');
  var i = 0;

  function typeNext() {
    if (i < word.length) {
      twText.textContent += word[i];
      i++;
      setTimeout(typeNext, 130);
    } else {
      setTimeout(function() { if (twCursor) twCursor.style.display = 'none'; }, 700);
      var ver = document.getElementById('devti-ver');
      if (ver) ver.style.opacity = '0.45';
      setTimeout(function() {
        var el = document.getElementById('intro-lines');
        if (el) el.style.opacity = '1';
      }, 300);
      setTimeout(function() {
        var el = document.getElementById('intro-tags');
        if (el) el.style.opacity = '1';
      }, 600);
      setTimeout(function() {
        var el = document.getElementById('intro-btn');
        if (el) el.style.opacity = '1';
      }, 900);
    }
  }

  setTimeout(typeNext, 300);
}

function showQuestion() {
  var q = questions[current];
  var total = questions.length;
  var pct = Math.round((current / total) * 100);
  setTitle('enigma.exe — desafio ' + (current + 1) + '/' + total);

  var optsHtml = '';
  for (var i = 0; i < q.options.length; i++) {
    optsHtml += '<button class="opt" id="opt' + i + '" onclick="pick(' + i + ')">' + q.options[i] + '</button>';
  }

  render(
    '<div class="prog-wrap">' +
      '<div class="prog-top">' +
        '<span class="prog-label">progress: ' + current + '/' + total + '</span>' +
        '<span class="prog-score">score: ' + score + '</span>' +
      '</div>' +
      '<div class="prog-bar"><div class="prog-fill" style="width:' + pct + '%"></div></div>' +
    '</div>' +
    '<span class="q-badge ' + q.badge + '">' + q.cat + '</span>' +
    '<div class="q-code">' + q.code + '</div>' +
    '<div class="q-text">' + q.text + '</div>' +
    '<button class="hint-btn" id="hintBtn" onclick="showHint()">// mostrar dica</button>' +
    '<div class="hint-box" id="hintBox">// DICA: ' + q.hint + '</div>' +
    '<div class="opts" id="opts">' + optsHtml + '</div>' +
    '<div class="fb" id="fb"></div>' +
    '<button class="next-btn" id="nextBtn" onclick="nextQ()">' +
      (current + 1 < total ? '$ next_challenge &#8594;' : '$ unlock_payload &#8594;') +
    '</button>'
  );
  answered = false;
}

function showHint() {
  var h = document.getElementById('hintBox');
  var b = document.getElementById('hintBtn');
  if (h) h.style.display = 'block';
  if (b) b.style.display = 'none';
}

function pick(i) {
  if (answered) return;
  answered = true;
  var q = questions[current];
  var opts = document.querySelectorAll('.opt');
  for (var k = 0; k < opts.length; k++) opts[k].disabled = true;
  var fb = document.getElementById('fb');
  if (i === q.answer) {
    score++;
    document.getElementById('opt' + i).classList.add('correct');
    fb.textContent = q.ok;
    fb.className = 'fb ok';
  } else {
    document.getElementById('opt' + i).classList.add('wrong');
    document.getElementById('opt' + q.answer).classList.add('correct');
    fb.textContent = '// ✗ Errou! ' + q.ok;
    fb.className = 'fb nope';
  }
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQ() {
  current++;
  if (current < questions.length) showQuestion();
  else showFinal();
}

function showFinal() {
  var total = questions.length;
  var pct = Math.round((score / total) * 100);
  var rank = pct === 100 ? '10x Developer 🔥' : pct >= 70 ? 'Senior Dev' : pct >= 40 ? 'Junior Dev' : 'Estagiário';
  setTitle('enigma.exe — payload desbloqueado ✓');
  render(
    '<div class="f-line green">$ decrypt secret_message.enc</div>' +
    '<div class="f-line">Decrypting... ████████████████ 100%</div>' +
    '<div class="f-line">✓ Autenticação concluída.</div>' +
    '<div class="f-line">✓ Payload verificado.</div>' +
    '<div class="f-line">✓ Mensagem liberada:</div>' +
    '<div class="reveal-block">' +
      '<div class="reveal-title">&gt; Você vai ser TITIO! 🍼</div>' +
      '<div class="reveal-code">' +
        '<span class="hl">const</span> baby = <span class="green">{</span><br>' +
        '&nbsp;&nbsp;status: <span class="green">"a caminho"</span>,<br>' +
        '&nbsp;&nbsp;tios: [<span class="green">"você"</span>, <span class="green">"seu irmão"</span>],<br>' +
        '&nbsp;&nbsp;amor: <span class="pink">Infinity</span>,<br>' +
        '&nbsp;&nbsp;chegada: <span class="green">"em breve"</span><br>' +
        '<span class="green">}</span>' +
      '</div>' +
    '</div>' +
    '<div class="score-row">score: <span>' + score + '/' + total + ' (' + pct + '%)</span></div>' +
    '<div class="score-row">rank: <span>' + rank + '</span></div>' +
    '<div class="f-line" style="margin-top:.5rem;">// Parabéns, tio! Novo dependency adicionado à família. 💚</div>' +
    '<button class="restart-btn" onclick="restart()">$ git reset --hard HEAD && ./iniciar_desafio.sh</button>'
  );
  launchConfetti();
}

function startGame() { current = 0; score = 0; showQuestion(); }
function restart()   { current = 0; score = 0; showIntro(); }

function launchConfetti() {
  var canvas = document.getElementById('confetti-canvas');
  canvas.style.display = 'block';
  var ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  var colors = ['#3fb950','#58a6ff','#d29922','#f0883e','#bc8cff','#58d68d'];
  var pieces = [];
  for (var i = 0; i < 70; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * -canvas.height,
      w: Math.random() * 8 + 4, h: Math.random() * 4 + 2,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI * 2,
      vx: (Math.random() - 0.5) * 2, vy: Math.random() * 3 + 2,
      vr: (Math.random() - 0.5) * 0.15
    });
  }
  var frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (var i = 0; i < pieces.length; i++) {
      var p = pieces[i];
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color; ctx.globalAlpha = 0.85;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      if (p.y > canvas.height) { p.y = -10; p.x = Math.random() * canvas.width; }
    }
    frame++;
    if (frame < 220) requestAnimationFrame(draw);
    else { ctx.clearRect(0, 0, canvas.width, canvas.height); canvas.style.display = 'none'; }
  }
  draw();
}

// Garante que o DOM está pronto antes de iniciar
window.onload = function() { showIntro(); };
